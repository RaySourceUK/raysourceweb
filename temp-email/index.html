<script>
    const API_BASE = 'https://plain-disk-aa56.taloninteractive.workers.dev';
    const EMAIL_DOMAIN = 'temp.raysource.co.uk';
    const TTL_MS = 3600 * 1000;

    let currentAddress = '';
    let currentEmailId = null;
    let expiryTs = 0;
    let expiryTimer = null;
    let autoRefreshTimer = null;
    let emails = [];

    const ADJS = ['swift', 'calm', 'bright', 'deep', 'dark', 'quiet', 'wide', 'keen', 'bold', 'soft', 'long', 'free', 'safe', 'cool', 'warm', 'thin', 'vast', 'wild'];
    const NOUNS = ['ray', 'tide', 'wave', 'reef', 'cove', 'bay', 'mist', 'dusk', 'dawn', 'tern', 'kelp', 'isle', 'shoal', 'brine', 'gull'];

    function randomAddress() {
        const a = ADJS[Math.floor(Math.random() * ADJS.length)];
        const n = NOUNS[Math.floor(Math.random() * NOUNS.length)];
        const r = Math.floor(Math.random() * 9000) + 1000;
        return `${a}-${n}-${r}@${EMAIL_DOMAIN}`;
    }

    function generateNewAddress() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        if (expiryTimer) clearInterval(expiryTimer);
        currentAddress = randomAddress();
        expiryTs = Date.now() + TTL_MS;
        emails = [];
        document.getElementById('email-address').textContent = currentAddress;
        renderEmpty('Inbox empty', "Send an email to your temporary address above and it'll appear here.");
        startExpiry();
        startAutoRefresh();
    }

    function startExpiry() {
        if (expiryTimer) clearInterval(expiryTimer);
        updateExpiry();
        expiryTimer = setInterval(updateExpiry, 1000);
    }

    function updateExpiry() {
        const el = document.getElementById('expiry-display');
        const remaining = Math.max(0, expiryTs - Date.now());
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        el.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        el.className = 'expiry-time' + (mins < 5 ? (mins < 1 ? ' critical' : ' warning') : '');
        if (remaining === 0) {
            clearInterval(expiryTimer);
            clearInterval(autoRefreshTimer);
            renderEmpty('Inbox expired', 'This address has expired. Generate a new one to continue.');
        }
    }

    function startAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(checkInbox, 15000);
    }

    async function checkInbox() {
        if (!currentAddress) return;
        const btn = document.getElementById('refresh-btn');
        btn.disabled = true;
        try {
            const res = await fetch(`${API_BASE}?email=${encodeURIComponent(currentAddress)}`);
            if (res.status === 404) {
                renderEmpty('Inbox empty', "Send an email to your temporary address above and it'll appear here.");
                return;
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                showToast(err.error || 'Something went wrong. Please try again.', 'error');
                return;
            }
            const data = await res.json();
            emails = [data];
            renderEmails();
        } catch (e) {
            showToast('Could not connect to the server. Please try again.', 'error');
        } finally {
            btn.disabled = false;
        }
    }

    function renderEmpty(title, subtitle) {
        document.getElementById('email-list').innerHTML = `
      <div class="inbox-state">
        <div class="inbox-state-icon">📭</div>
        <h3>${escHtml(title)}</h3>
        <p>${escHtml(subtitle)}</p>
      </div>`;
    }

    function renderEmails() {
        const list = document.getElementById('email-list');
        if (!emails.length) { renderEmpty('Inbox empty', "Send an email to your temporary address and it'll appear here."); return; }
        list.innerHTML = emails.map((e, i) => `
      <div class="email-item unread" onclick="openEmail(${i})">
        <div class="email-from">${escHtml(e.from || 'Unknown Sender')}</div>
        <div class="email-time">${formatTime(e.timestamp)}</div>
        <div class="email-subject">${escHtml(e.subject || '(No Subject)')}</div>
      </div>`).join('');
    }

    function openEmail(idx) {
        const e = emails[idx];
        currentEmailId = e.id;
        document.getElementById('modal-subject').textContent = e.subject || '(No Subject)';
        document.getElementById('modal-meta').textContent = `From: ${e.from || 'Unknown'}`;
        document.getElementById('modal-body-text').textContent = extractBody(e.body || '');
        document.getElementById('email-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
        if (event && event.target !== document.getElementById('email-modal')) return;
        document.getElementById('email-modal').style.display = 'none';
        document.body.style.overflow = '';
    }

    function openReport() {
        document.getElementById('report-modal').style.display = 'flex';
    }

    function closeReportModal(event) {
        if (event && event.target !== document.getElementById('report-modal')) return;
        document.getElementById('report-modal').style.display = 'none';
    }

    async function submitReport() {
        const reason = document.getElementById('report-reason').value.trim();
        if (!reason) { showToast('Please provide a reason before submitting.', 'error'); return; }
        try {
            const res = await fetch(`${API_BASE}/report`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emailId: currentEmailId, reason })
            });
            const data = await res.json();
            if (data.success) {
                showToast('Report submitted. Thank you.', 'success');
                document.getElementById('report-reason').value = '';
                document.getElementById('report-modal').style.display = 'none';
            } else {
                showToast(data.error || 'Could not submit report.', 'error');
            }
        } catch (e) {
            showToast('Network error. Please try again.', 'error');
        }
    }

    function copyAddress() {
        if (!currentAddress) return;
        navigator.clipboard.writeText(currentAddress)
            .then(() => showToast('Copied to clipboard', 'success'))
            .catch(() => showToast('Could not copy, please copy manually.', 'error'));
    }


    function extractBody(raw) {
        if (!raw) return '';

        const text = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

        const unfolded = text.replace(/\n([ \t]+)/g, ' ');

        const ctMatch = unfolded.match(/^content-type:\s*([^;\n]+)/im);
        const ct = ctMatch ? ctMatch[1].trim().toLowerCase() : '';

        if (ct.startsWith('multipart/')) {
            const bMatch = unfolded.match(/\bboundary=\s*"([^"]+)"/i)
                || unfolded.match(/\bboundary=\s*([^\s;]+)/i);
            if (bMatch) {
                const boundary = bMatch[1].trim();
                const result = parseMimeParts(text, boundary);
                if (result) return result;
            }
        }

        const headerEnd = text.indexOf('\n\n');
        if (headerEnd === -1) return text.trim();

        const headerBlock = text.slice(0, headerEnd);
        const body = text.slice(headerEnd + 2);

        return decodePartBody(body, headerBlock);
    }

    function parseMimeParts(text, boundary) {
        const delim = '--' + boundary;
        const parts = text.split(delim);

        let plainText = null;
        let htmlText = null;

        for (const part of parts) {
            const trimmed = part.trim();
            if (!trimmed || trimmed === '--') continue;


            const unfolded = part.replace(/\n([ \t]+)/g, ' ');
            const hdrEnd = unfolded.indexOf('\n\n');
            if (hdrEnd === -1) continue;

            const hdrBlock = unfolded.slice(0, hdrEnd);

            const origHdrEnd = part.indexOf('\n\n');
            const body = origHdrEnd !== -1 ? part.slice(origHdrEnd + 2) : '';

            const ctMatch = hdrBlock.match(/content-type:\s*([^;\n]+)/i);
            const partCt = ctMatch ? ctMatch[1].trim().toLowerCase() : 'text/plain';

            if (partCt.startsWith('text/plain') && !plainText) {
                plainText = decodePartBody(body, hdrBlock);
            } else if (partCt.startsWith('text/html') && !htmlText) {
                htmlText = stripHtml(decodePartBody(body, hdrBlock));
            }
        }

        return plainText || htmlText || null;
    }

    function decodePartBody(body, headerBlock) {
        const hdrs = (headerBlock || '').toLowerCase();
        const encMatch = hdrs.match(/content-transfer-encoding:\s*(\S+)/);
        const enc = encMatch ? encMatch[1].trim() : '';

        if (enc === 'base64') {
            try {
                const cleaned = body.replace(/\s+/g, '');
                const binary = atob(cleaned);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return new TextDecoder('utf-8').decode(bytes);
            } catch (e) {
                return body.trim();
            }
        }

        if (enc === 'quoted-printable') {
            return body
                .replace(/=\r?\n/g, '')
                .replace(/=([0-9A-Fa-f]{2})/g, (_, h) => String.fromCharCode(parseInt(h, 16)));
        }

        return body.trim();
    }

    function stripHtml(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        div.querySelectorAll('br, p, div, tr, li').forEach(el => {
            el.insertAdjacentText('afterend', '\n');
        });
        return (div.textContent || div.innerText || '')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

 

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatTime(ts) {
        if (!ts) return '—';
        return new Date(ts).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg, type = 'success') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3200);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('email-modal').style.display = 'none';
            document.getElementById('report-modal').style.display = 'none';
            document.body.style.overflow = '';
        }
    });

    generateNewAddress();
</script>
